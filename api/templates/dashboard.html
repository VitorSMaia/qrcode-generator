{% extends "components/app.html" %}

{% block title %}Meu Dashboard QR{% endblock %}

{% block body_attrs %} class="bg-gray-50 p-6"{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Meus QR Codes</h1>
        <button onclick="logout()" class="text-red-500 border border-red-500 px-4 py-1 rounded hover:bg-red-50">
            Sair
        </button>
    </div>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-8">
        <h3 class="font-bold mb-4 text-lg">Gerar Novo QR Code</h3>

        <div class="flex gap-4">
            <div class="flex-1">
                <label class="text-sm text-gray-600">Nome do QR</label>
                <input type="text" id="slug" placeholder="ex: menu-restaurante"
                    class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-indigo-200">
            </div>

            <div class="flex-1">
                <label class="text-sm text-gray-600">Link de destino</label>
                <input type="text" id="conteudo" placeholder="https://..."
                    class="w-full p-2 border rounded mt-1 focus:ring-2 focus:ring-indigo-200">
            </div>

            <div class="flex items-end">
                <button onclick="criarQR()"
                    class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 transition">
                    Gerar
                </button>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-100 text-gray-700 text-sm uppercase">
                <tr>
                    <th class="p-4">Nome</th>
                    <th class="p-4">Link</th>
                    <th class="p-4">Acessos</th>
                    <th class="p-4">Ações</th>
                </tr>
            </thead>

            <tbody id="lista-qr"></tbody>
        </table>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login-view";
}

async function carregarDashboard() {
    try {
        const res = await fetch("/dashboard", {
            headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Falha ao carregar dashboard");
        }

        const lista = document.getElementById("lista-qr");

        lista.innerHTML = (data || []).map((item) => `
            <tr class="border-t hover:bg-gray-50 transition">

                <td class="p-4 font-semibold text-indigo-600">
                    ${item.slug}
                </td>

                <td class="p-4 text-gray-600 break-all">
                    <a href="${item.conteudo_original}" target="_blank"
                        class="text-blue-500 hover:underline">
                        ${item.conteudo_original}
                    </a>
                </td>

                <td class="p-4">
                    <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm font-bold">
                        ${item.contador}
                    </span>
                </td>

                <td class="p-4 space-x-2">

                    <button onclick="copiarLink('${item.slug}')"
                        class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">
                        📋
                    </button>

                    <button onclick="baixarQR('${item.slug}')"
                        class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200">
                        ⬇️
                    </button>

                    <button onclick="editarLink('${item.slug}', '${item.conteudo_original}')"
                        class="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded hover:bg-yellow-200">
                        ✏️
                    </button>

                    <button onclick="excluirQR('${item.slug}')"
                        class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">
                        🗑️
                    </button>

                </td>
            </tr>
        `).join("");

    } catch (error) {
        mostrarToast("Erro: " + error.message);
    }
}

async function criarQR() {
    const slug = document.getElementById("slug").value.trim();
    const conteudo = document.getElementById("conteudo").value.trim();

    if (!slug || !conteudo) {
        mostrarToast("Preencha todos os campos.");
        return;
    }

    try {
        const res = await fetch("/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ slug, conteudo })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Não foi possível criar o QR Code");
        }

        document.getElementById("slug").value = "";
        document.getElementById("conteudo").value = "";

        mostrarToast("QR Code criado com sucesso!");
        await carregarDashboard();

    } catch (error) {
        mostrarToast("Erro: " + error.message);
    }
}

function logout() {
    localStorage.clear();
    window.location.href = "/login-view";
}

function copiarLink(slug) {
    const url = window.location.origin + "/l/" + slug;
    navigator.clipboard.writeText(url);
    mostrarToast("Link copiado!");
}

function baixarQR(slug) {
    window.open(`/qr/${slug}.png`, "_blank");
}

async function editarLink(slug, conteudoAtual) {
    const novoConteudo = prompt(`Novo link para "${slug}":`, conteudoAtual);

    if (!novoConteudo || novoConteudo.trim() === "" || novoConteudo === conteudoAtual) {
        return;
    }

    try {
        const res = await fetch(`/qrcode/${encodeURIComponent(slug)}`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ novo_conteudo: novoConteudo.trim() })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Não foi possível editar o link");
        }

        mostrarToast("Link atualizado!");
        await carregarDashboard();

    } catch (error) {
        mostrarToast("Erro: " + error.message);
    }
}

async function excluirQR(slug) {
    const confirmou = confirm(`Tem certeza que deseja excluir "${slug}"?`);

    if (!confirmou) return;

    try {
        const res = await fetch(`/qrcode/${encodeURIComponent(slug)}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Não foi possível excluir");
        }

        mostrarToast("QR Code excluído!");
        await carregarDashboard();

    } catch (error) {
        mostrarToast("Erro: " + error.message);
    }
}

function mostrarToast(msg) {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.className = "fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded shadow-lg";
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
}

carregarDashboard();
</script>
{% endblock %}
