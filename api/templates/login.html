<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7E5GWKNXDL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7E5GWKNXDL');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6001125874185977" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>QR Tracker - Login</title>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 id="form-title" class="text-2xl font-bold mb-6 text-center text-indigo-600">Login</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="E-mail" class="w-full p-2 border rounded">
            <input type="password" id="password" placeholder="Senha" class="w-full p-2 border rounded">
            <button onclick="auth()" id="btn-auth" class="w-full bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700">Entrar</button>
            <p class="text-sm text-center">
                <a href="#" onclick="toggleMode(event)" id="toggle-link" class="text-indigo-500">Criar uma conta</a>
            </p>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleMode(event) {
            if (event) event.preventDefault();
            isLogin = !isLogin;
            document.getElementById("form-title").innerText = isLogin ? "Login" : "Cadastro";
            document.getElementById("btn-auth").innerText = isLogin ? "Entrar" : "Cadastrar";
            document.getElementById("toggle-link").innerText = isLogin ? "Criar uma conta" : "Ja tenho conta";
        }

        async function auth() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const endpoint = isLogin ? "/login" : "/signup";

            if (!email || !password) {
                alert("Preencha e-mail e senha.");
                return;
            }

            try {
                const res = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || "Verifique seus dados");
                }

                if (isLogin) {
                    localStorage.setItem("token", data.access_token);
                    window.location.href = "/dashboard-view";
                    return;
                }

                alert("Conta criada! Agora faca login.");
                toggleMode();
            } catch (error) {
                alert("Erro: " + error.message);
            }
        }
    </script>
</body>
</html>
